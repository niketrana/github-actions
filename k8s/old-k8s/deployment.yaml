apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: nginx:alpine
        env:
        - name: APP_COLOR
          valueFrom:
            configMapKeyRef:
              name: myapp-config
              key: APP_COLOR
        ports:
        - containerPort: 80

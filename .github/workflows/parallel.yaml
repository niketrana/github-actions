name: Parallel Jobs Pipeline

on:
  push:
    branches: [main]

jobs:

  # 🔹 Build Job (runs in parallel)
  build:
    runs-on: ubuntu-latest
    steps:
    - run: echo "Building application..."

  # 🔹 Deploy to DEV (parallel)
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: helm/kind-action@v1

    - run: kubectl create namespace dev || true
    - run: kubectl apply -f k8s/dev/
    - run: kubectl rollout status deployment/nginx -n dev --timeout=120s

  # 🔹 Deploy to STAGING (parallel)
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: helm/kind-action@v1

    - run: kubectl create namespace staging || true
    - run: kubectl apply -f k8s/staging/
    - run: kubectl rollout status deployment/nginx -n staging --timeout=120s

  # 🔹 Final Job (runs AFTER all parallel jobs)
  verify:
    runs-on: ubuntu-latest
    needs: [build, deploy-dev, deploy-staging]

    steps:
    - run: echo "All parallel jobs completed successfully!"

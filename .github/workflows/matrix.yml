  push:
    branches:
      - main

jobs:
  matrix-job:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show version
        run: echo "Running version ${{ matrix.version }}"

      - name: Show directory
        run: ls -R

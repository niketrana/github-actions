name: Matrix Lab

on:
  push:
    branches:
      - main

jobs:
  matrix-job:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        version: [1, 2]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Matrix Info
        run: echo "Running on ${{ matrix.os }} version ${{ matrix.version }}"

      - name: List Files
        run: ls

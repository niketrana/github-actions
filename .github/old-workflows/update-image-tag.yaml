name: Build Image and Update Kubernetes Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t rananiket/docker-ci-lab:$TAG .

      - name: Push Docker Image
        run: |
          docker push rananiket/docker-ci-lab:$TAG

      - name: Update Kubernetes YAML
        run: |
          sed -i "s|docker-ci-lab:.*|docker-ci-lab:$TAG|g" k8s/dep-svc.yaml

      - name: Commit Updated YAML
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/dep-svc.yaml
          git commit -m "Update image tag to $TAG" || echo "No changes"
          git push

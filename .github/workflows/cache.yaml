name: Docker Cache + Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🔹 Setup buildx
    - uses: docker/setup-buildx-action@v3

    # 🔹 Login
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build with cache (KEY STEP)
    - name: Build and Push with Cache
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/cache-nginx:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 🔹 Create cluster
    - uses: helm/kind-action@v1

    # 🔹 Replace image
    - name: Update YAML
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/cache-nginx:latest|g" k8s/deployment.yaml

    # 🔹 Deploy
    - name: Deploy
      run: kubectl apply -f k8s/

    # 🔹 Wait for pods
    - name: Wait for rollout
      run: kubectl rollout status deployment/nginx-cache --timeout=120s

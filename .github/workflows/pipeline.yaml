name: Multi Job Pipeline

on:
  push:
    branches:
      - main
#  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Step
        run: |
          echo "Building application..."
          mkdir build
          echo "Build completed" > build/build.txt
          cat build/build.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test Step
        run: |
          echo "Running tests..."
          echo "Tests passed"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy Step
        run: |
          echo "Deploying application..."
          echo "Deployment successful"

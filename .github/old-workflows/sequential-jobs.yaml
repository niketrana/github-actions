name: Sequential Jobs Lab

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Run Job 1
        run: echo "This is Job 1"
      - name: Sleep
        run: sleep 10

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Run Job 2
        run: echo "This is Job 2"

  job3:
    needs: job2
    runs-on: ubuntu-latest
    steps:
      - name: Run Job 3
        run: echo "This is Job 3"

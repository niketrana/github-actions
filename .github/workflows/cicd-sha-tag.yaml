name: CI-CD with SHA Tag

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🔹 Set IMAGE TAG = commit SHA
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    # 🔹 Build image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/n-nginx-app:${IMAGE_TAG} .

    # 🔹 Login
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Push image
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/n-nginx-app:${IMAGE_TAG}

    # 🔹 Create cluster
    - name: Create kind cluster
      uses: helm/kind-action@v1

    # 🔹 Replace image in YAML
    - name: Update Deployment Image
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/n-nginx-app:${IMAGE_TAG}|g" k8s/deployment.yaml

    # 🔹 Deploy
    - name: Deploy
      run: kubectl apply -f k8s/

    # 🔹 Verify
    - name: Verify
      run: kubectl get pods

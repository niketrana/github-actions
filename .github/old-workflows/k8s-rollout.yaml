name: Kubernetes Rollout Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-push-rollout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-lab:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-lab:latest

      - name: Setup Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Simulate Kubernetes Rollout
        run: |
          echo "Updating Kubernetes deployment..."
          cat k8s/dep-svc.yaml
          echo "Rollout completed successfully"

name: Checkout Lab

on:
  push:
    branches:
      - main

jobs:
  checkout-job:
    if: contains(github.event.head_commit.message, 'checkout')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Files
        run: ls -l

      - name: Show Commit Message
        run: echo "${{ github.event.head_commit.message }}"

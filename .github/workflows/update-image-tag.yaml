name: Update Kubernetes Image Tag

on:
  push:
    branches:
      - main

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "Tag is $TAG"
          sed -i "s|docker-ci-lab:latest|docker-ci-lab:$TAG|g" k8s/dep-svc.yaml

      - name: Commit Updated YAML
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/dep-svc.yaml
          git commit -m "Update image tag to $TAG" || echo "No changes"
          git push

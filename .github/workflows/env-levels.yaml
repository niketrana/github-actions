name: Env Levels Lab

on:
  workflow_dispatch:

env:
  NAME: Workflow

jobs:
  env-job:
    runs-on: ubuntu-latest
    env:
      NAME: Job

    steps:
      - name: Step 1 - Print NAME
        run: echo $NAME

      - name: Step 2 - Override at Step Level
        env:
          NAME: Step
        run: echo $NAME

      - name: Step 3 - Back to Job Level
        run: echo $NAME

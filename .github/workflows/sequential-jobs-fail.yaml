name: Sequential Jobs Fail Lab

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Job 1 will fail
        run: exit 1

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Job 2
        run: echo "This is Job 2"

  job3:
    needs: job2
    runs-on: ubuntu-latest
    steps:
      - name: Job 3
        run: echo "This is Job 3"

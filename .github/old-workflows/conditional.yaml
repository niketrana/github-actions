name: Conditional Workflow

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Step
        run: echo "Build successful"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Step
        run: echo "Deploying because branch is main"

  notify-success:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Success Message
        run: echo "Build succeeded"

  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Failure Message
        run: echo "Build failed"

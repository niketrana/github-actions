name: Docker Build-Push + Deploy

on:
  workflow_dispatch:
#  push:
#    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🔹 Setup Docker Buildx (required)
    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    # 🔹 Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build & Push image (MAIN STEP)
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/n-nginx-app:latest

    # 🔹 Create kind cluster
    - name: Create kind cluster
      uses: helm/kind-action@v1

    # 🔹 Replace image dynamically
    - name: Update Deployment
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/n-nginx-app:latest|g" k8s/deployment.yaml

    # 🔹 Deploy
    - name: Deploy
      run: kubectl apply -f k8s/

    # 🔹 Verify
    - name: Verify
      run: kubectl get pods

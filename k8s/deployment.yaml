apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-cache
  template:
    metadata:
      labels:
        app: nginx-cache
    spec:
      containers:
      - name: nginx
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80

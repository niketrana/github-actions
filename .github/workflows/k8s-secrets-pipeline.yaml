name: K8s Secrets Pipeline

on:
  push:
    branches: [main]

jobs:
  secrets-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1

    # 🔹 Create K8s secret from GitHub secret
    - name: Create Secret
      run: |
        kubectl create namespace dev || true
        kubectl create secret generic mysecret \
          --from-literal=password=${{ secrets.MY_PASSWORD }} \
          -n dev

    # 🔹 Verify
    - name: Verify Secret
      run: kubectl get secret mysecret -n dev

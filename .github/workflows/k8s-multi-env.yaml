name: Multi-Env Deploy (with Approval)

on:
  push:
    branches: [main]

jobs:

  # 🔹 DEV
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Create namespace
      run: kubectl create namespace dev || true

    - name: Deploy to Dev
      run: kubectl apply -f k8s/dev/

    - name: Wait for Pods (Dev)
      run: kubectl rollout status deployment/nginx -n dev --timeout=120s

---

  # 🔹 STAGING (requires approval)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Create namespace
      run: kubectl create namespace staging || true

    - name: Deploy to Staging
      run: kubectl apply -f k8s/staging/

    - name: Wait for Pods (Staging)
      run: kubectl rollout status deployment/nginx -n staging --timeout=120s

---

  # 🔹 PROD (requires approval)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod

    steps:
    - uses: actions/checkout@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Create namespace
      run: kubectl create namespace prod || true

    - name: Deploy to Prod
      run: kubectl apply -f k8s/prod/

    - name: Wait for Pods (Prod)
      run: kubectl rollout status deployment/nginx -n prod --timeout=120s
